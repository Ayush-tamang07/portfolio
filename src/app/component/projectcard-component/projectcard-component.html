<section class="w-80 bg-slate-700 rounded-xl shadow-lg overflow-hidden">
  <!-- Image wrapper (important for absolute title positioning) -->
  <div class="relative">
    <img [src]="image" alt="{{ title }}" class="w-full h-48 object-cover" />

    <!-- Title overlay -->
    <h1 class="absolute bottom-3 left-3 text-white font-bold text-lg bg-black/60 px-3 py-1 rounded">
      {{ title }}
    </h1>
  </div>

  <!-- Description -->
  <div class="p-4"> 
    <p class="text-gray-700 text-sm text-left">
      {{ description }} 
    </p>
  </div>

  <div class="flex justify-end gap-2 px-2 py-2">
    <button class="bg-[#a871f1] rounded-lg px-3 py-2 cursor-not-allowed">Live Demo</button>
    <!-- <button class="bg-[#a871f1] rounded-lg px-3 py-2 cursor-pointer" value="{{github}}">Github</button> -->
    <a
      [href]="github"
      target="_blank"
      class="bg-[#a871f1] rounded-lg px-3 py-2 text-white inline-block"
    >
      Github
    </a>
  </div>

  <!-- a871f1 -->
</section>
